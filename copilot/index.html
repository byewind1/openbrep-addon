<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GDL Copilot</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1e293b;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --border: #1f2937;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: "SF Mono", Menlo, Monaco, Consolas, monospace;
    }
    .app {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .header {
      flex-shrink: 0;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(15,23,42,0.95);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .title h1 {
      margin: 0;
      font-size: 18px;
      color: var(--accent);
      font-weight: 700;
    }
    .title p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }
    .clear-btn {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .clear-btn:hover {
      color: var(--danger);
      border-color: var(--danger);
    }

    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      word-break: break-word;
      white-space: pre-wrap;
    }

    .msg-wrap {
      display: flex;
      width: 100%;
    }
    .msg-wrap.user { justify-content: flex-end; }
    .msg-wrap.assistant { justify-content: flex-start; }

    .msg {
      max-width: 100%;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
      word-break: break-word;
      overflow-wrap: anywhere;
    }
    .user .msg {
      background: var(--panel-2);
      color: #e2e8f0;
    }
    .assistant .msg {
      background: var(--bg);
      color: var(--text);
    }
    .msg-images {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-bottom: 6px;
    }
    .msg-image {
      width: 84px;
      height: 84px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b1220;
      flex-shrink: 0;
    }

    .code {
      position: relative;
      margin-top: 8px;
      border-left: 3px solid var(--accent);
      background: var(--panel-2);
      border-radius: 8px;
      padding: 10px 10px 10px 12px;
      overflow: auto;
    }
    .code pre {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: #dbeafe;
    }
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .copy-btn:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .composer {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: rgba(15,23,42,0.95);
      padding: 10px 16px;
      display: grid;
      gap: 8px;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    .input-actions {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    textarea {
      width: 100%;
      height: 80px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      line-height: 1.4;
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.15);
    }

    .attach-btn {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 16px;
      line-height: 1;
    }
    .attach-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .send-btn {
      height: 40px;
      min-width: 92px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #0b1220;
      font-weight: 700;
      cursor: pointer;
      padding: 0 14px;
    }
    .send-btn:disabled,
    .attach-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .image-box {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      padding: 8px;
    }
    .image-box.hidden {
      display: none;
    }
    .image-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .image-thumb {
      position: relative;
      width: 56px;
      height: 56px;
      flex-shrink: 0;
    }
    .image-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: #0b1220;
      display: block;
    }
    .image-thumb button {
      position: absolute;
      top: -6px;
      right: -6px;
      width: 18px;
      height: 18px;
      border: 1px solid var(--border);
      background: #0b1220;
      color: var(--muted);
      border-radius: 999px;
      cursor: pointer;
      font-size: 11px;
      line-height: 1;
      padding: 0;
    }
    .image-thumb button:hover {
      color: var(--danger);
      border-color: var(--danger);
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .loading {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      color: var(--accent);
      font-size: 12px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .2; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    .error {
      color: var(--danger);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title">
        <h1>🤖 GDL Copilot</h1>
        <p>Archicad GDL 修复助手</p>
      </div>
      <button id='clear' class='clear-btn' title='清空对话'>🗑 清空</button>
    </header>

    <main id="chat" class="chat"></main>

    <footer class="composer">
      <div id="imageBox" class="image-box hidden">
        <div id="imageList" class="image-list"></div>
      </div>
      <div class="input-row">
        <textarea id="input" placeholder="粘贴报错信息、代码片段，或直接粘贴截图..."></textarea>
        <div class="input-actions">
          <button id="attach" class="attach-btn" title="选择图片">📎</button>
          <button id="send" class="send-btn">发送</button>
        </div>
      </div>
      <input id="imageInput" type="file" accept="image/*" multiple hidden />
      <div class="hint">
        <span>Enter 发送，Shift+Enter 换行，Cmd+V 可粘贴截图</span>
        <span id="status"></span>
      </div>
      <div id="error" class="error"></div>
    </footer>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendEl = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');
    const clearEl = document.getElementById('clear');
    const attachEl = document.getElementById('attach');
    const imageInputEl = document.getElementById('imageInput');
    const imageBoxEl = document.getElementById('imageBox');
    const imageListEl = document.getElementById('imageList');

    const history = [];
    let sending = false;
    const maxImages = 3;
    const currentImages = [];

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function parseMessageWithCodeBlocks(text) {
      const regex = /```gdl\s*([\s\S]*?)```/gi;
      const segments = [];
      let lastIndex = 0;
      let m;
      while ((m = regex.exec(text)) !== null) {
        if (m.index > lastIndex) {
          segments.push({ type: 'text', content: text.slice(lastIndex, m.index) });
        }
        segments.push({ type: 'code', content: (m[1] || '').trim() });
        lastIndex = regex.lastIndex;
      }
      if (lastIndex < text.length) {
        segments.push({ type: 'text', content: text.slice(lastIndex) });
      }
      if (segments.length === 0) {
        segments.push({ type: 'text', content: text });
      }
      return segments;
    }

    function createCopyButton(codeText) {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = '复制';
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(codeText);
          btn.disabled = true;
          const old = btn.textContent;
          btn.textContent = '✓ 已复制';
          setTimeout(() => {
            btn.textContent = old;
            btn.disabled = false;
          }, 2000);
        } catch {
          btn.textContent = '复制失败';
          setTimeout(() => (btn.textContent = '复制'), 1500);
        }
      });
      return btn;
    }

    function appendMessage(role, text, imageDataUrls = []) {
      const wrap = document.createElement('div');
      wrap.className = `msg-wrap ${role}`;

      const msg = document.createElement('div');
      msg.className = 'msg';

      if (role === 'assistant') {
        const segments = parseMessageWithCodeBlocks(text);
        for (const seg of segments) {
          if (seg.type === 'text' && seg.content.trim()) {
            const p = document.createElement('div');
            p.innerHTML = escapeHtml(seg.content);
            msg.appendChild(p);
          }
          if (seg.type === 'code') {
            const block = document.createElement('div');
            block.className = 'code';
            const pre = document.createElement('pre');
            pre.textContent = seg.content;
            block.appendChild(pre);
            block.appendChild(createCopyButton(seg.content));
            msg.appendChild(block);
          }
        }
      } else {
        if (Array.isArray(imageDataUrls) && imageDataUrls.length > 0) {
          const imagesWrap = document.createElement('div');
          imagesWrap.className = 'msg-images';
          for (const url of imageDataUrls) {
            const img = document.createElement('img');
            img.className = 'msg-image';
            img.src = url;
            img.alt = '用户上传图片';
            imagesWrap.appendChild(img);
          }
          msg.appendChild(imagesWrap);
        }
        if (text) {
          const textNode = document.createElement('div');
          textNode.textContent = text;
          msg.appendChild(textNode);
        }
      }

      wrap.appendChild(msg);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function setLoading(on) {
      sending = on;
      sendEl.disabled = on;
      attachEl.disabled = on;
      inputEl.disabled = on;
      if (on) {
        statusEl.innerHTML = '<span class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span>发送中</span>';
      } else {
        statusEl.textContent = '';
      }
    }

    function updateImagePreview() {
      imageListEl.innerHTML = '';
      if (currentImages.length === 0) {
        imageBoxEl.classList.add('hidden');
        return;
      }

      for (let i = 0; i < currentImages.length; i += 1) {
        const item = currentImages[i];
        const thumb = document.createElement('div');
        thumb.className = 'image-thumb';

        const img = document.createElement('img');
        img.src = item.dataUrl;
        img.alt = item.name || `图片${i + 1}`;
        thumb.appendChild(img);

        const removeBtn = document.createElement('button');
        removeBtn.type = 'button';
        removeBtn.title = '移除图片';
        removeBtn.textContent = '✕';
        removeBtn.addEventListener('click', () => {
          currentImages.splice(i, 1);
          updateImagePreview();
        });
        thumb.appendChild(removeBtn);

        imageListEl.appendChild(thumb);
      }

      imageBoxEl.classList.remove('hidden');
    }

    function clearAttachedImages() {
      currentImages.length = 0;
      imageInputEl.value = '';
      updateImagePreview();
    }

    function fileToBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const result = String(reader.result || '');
          const base64 = result.includes(',') ? result.split(',')[1] : '';
          resolve(base64);
        };
        reader.onerror = () => reject(new Error('读取图片失败'));
        reader.readAsDataURL(file);
      });
    }

    async function addImageFile(file, fallbackName = '截图') {
      if (!file || !file.type || !file.type.startsWith('image/')) return false;
      if (currentImages.length >= maxImages) return false;

      const b64 = await fileToBase64(file);
      const mime = file.type || 'image/png';
      const dataUrl = `data:${mime};base64,${b64}`;

      currentImages.push({
        dataUrl,
        b64,
        mime,
        name: file.name || fallbackName
      });
      updateImagePreview();
      return true;
    }

    async function addImageFiles(files, fallbackName = '图片') {
      if (!files || files.length === 0) return;
      const slotsLeft = Math.max(0, maxImages - currentImages.length);
      if (slotsLeft === 0) {
        errorEl.textContent = '最多只能附加 3 张图片。';
        return;
      }

      let candidates = Array.from(files).filter((f) => f && f.type && f.type.startsWith('image/'));
      if (candidates.length > slotsLeft) {
        candidates = candidates.slice(0, slotsLeft);
        errorEl.textContent = '最多发送 3 张图片，已自动截断。';
      }

      for (const file of candidates) {
        await addImageFile(file, fallbackName);
      }
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      const hasImages = currentImages.length > 0;
      if ((!message && !hasImages) || sending) return;

      errorEl.textContent = '';
      const images = currentImages.map((img) => ({ ...img }));
      const currentImageDataUrls = images.map((img) => img.dataUrl);
      const userText = hasImages ? (message || '[图片]') : message;
      appendMessage('user', userText, currentImageDataUrls);
      const reqHistory = history.slice();
      inputEl.value = '';
      clearAttachedImages();
      setLoading(true);

      try {
        const res = await fetch('http://localhost:8502/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            message: message || '请结合这些截图分析问题并给出修复建议。',
            history: reqHistory,
            images: images.map((img) => ({ b64: img.b64, mime: img.mime }))
          })
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        const reply = (data.reply || '').trim();
        history.push({
          role: 'user',
          content: userText,
          imageDataUrls: currentImageDataUrls,
          imageNames: images.map((img) => img.name || null)
        });
        appendMessage('assistant', reply || '（空响应）');
        history.push({ role: 'assistant', content: reply || '（空响应）' });
      } catch (err) {
        errorEl.textContent = `请求失败：${err.message || err}`;
      } finally {
        setLoading(false);
        inputEl.focus();
      }
    }

    function clearChat() {
      history.length = 0;
      chatEl.innerHTML = '';
      clearAttachedImages();
      appendMessage('assistant', '你好！把 Archicad 的编译报错或有问题的 GDL 代码粘进来，我帮你修。也可以直接粘贴截图或点击📎上传图片。');
      history.push({ role: 'assistant', content: '你好！把 Archicad 的编译报错或有问题的 GDL 代码粘进来，我帮你修。也可以直接粘贴截图或点击📎上传图片。' });
      errorEl.textContent = '';
      inputEl.focus();
    }

    attachEl.addEventListener('click', () => imageInputEl.click());
    imageInputEl.addEventListener('change', async (e) => {
      try {
        const files = e.target.files;
        if (!files || files.length === 0) return;
        await addImageFiles(files, '图片');
      } catch (err) {
        errorEl.textContent = `图片加载失败：${err.message || err}`;
      } finally {
        imageInputEl.value = '';
      }
    });
    document.addEventListener('paste', async (e) => {
      try {
        const items = e.clipboardData && e.clipboardData.items;
        if (!items) return;
        for (const item of items) {
          if (item && item.type && item.type.startsWith('image/')) {
            if (currentImages.length >= maxImages) {
              errorEl.textContent = '最多只能附加 3 张图片。';
              e.preventDefault();
              break;
            }
            const file = item.getAsFile();
            if (!file) continue;
            e.preventDefault();
            await addImageFile(file, '粘贴截图');
            break;
          }
        }
      } catch (err) {
        errorEl.textContent = `粘贴图片失败：${err.message || err}`;
      }
    });
    clearEl.addEventListener('click', clearChat);
    sendEl.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    appendMessage('assistant', '你好！把 Archicad 的编译报错或有问题的 GDL 代码粘进来，我帮你修。也可以直接粘贴截图或点击📎上传图片。');
    history.push({ role: 'assistant', content: '你好！把 Archicad 的编译报错或有问题的 GDL 代码粘进来，我帮你修。也可以直接粘贴截图或点击📎上传图片。' });
    updateImagePreview();
    inputEl.focus();
  </script>
</body>
</html>
