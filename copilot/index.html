<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GDL Copilot</title>
  <style>
    :root {
      --bg: #0f172a;
      --panel: #111827;
      --panel-2: #1e293b;
      --text: #e5e7eb;
      --muted: #94a3b8;
      --accent: #22d3ee;
      --border: #1f2937;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      height: 100%;
      font-family: "SF Mono", Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    }
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      flex-shrink: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 16px;
      border-bottom: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(6px);
    }
    .title {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }
    .title h1 {
      margin: 0;
      font-size: 18px;
      color: var(--accent);
      font-weight: 700;
    }
    .title p {
      margin: 0;
      font-size: 12px;
      color: var(--muted);
    }

    .chat {
      flex: 1;
      min-height: 0;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .msg-wrap {
      display: flex;
      width: 100%;
    }
    .msg-wrap.user { justify-content: flex-end; }
    .msg-wrap.assistant { justify-content: flex-start; }

    .msg {
      max-width: min(860px, 86%);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 12px;
      white-space: pre-wrap;
      line-height: 1.5;
      font-size: 14px;
    }
    .user .msg {
      background: var(--panel-2);
      color: #e2e8f0;
    }
    .assistant .msg {
      background: var(--bg);
      color: var(--text);
    }

    .code {
      position: relative;
      margin-top: 8px;
      border-left: 3px solid var(--accent);
      background: var(--panel-2);
      border-radius: 8px;
      padding: 10px 10px 10px 12px;
      overflow: auto;
    }
    .code pre {
      margin: 0;
      font-size: 13px;
      line-height: 1.5;
      color: #dbeafe;
    }
    .copy-btn {
      position: absolute;
      top: 8px;
      right: 8px;
      border: 1px solid var(--accent);
      background: transparent;
      color: var(--accent);
      border-radius: 6px;
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
    }
    .copy-btn:disabled {
      opacity: 0.7;
      cursor: default;
    }

    .composer {
      flex-shrink: 0;
      border-top: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.95);
      backdrop-filter: blur(6px);
      padding: 12px 16px;
      display: grid;
      gap: 8px;
    }
    .input-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: end;
    }
    textarea {
      width: 100%;
      height: 74px;
      resize: none;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--panel);
      color: var(--text);
      padding: 10px 12px;
      font: inherit;
      line-height: 1.4;
      outline: none;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px rgba(34, 211, 238, 0.15);
    }

    .send-btn {
      height: 40px;
      min-width: 92px;
      border: 0;
      border-radius: 10px;
      background: var(--accent);
      color: #0b1220;
      font-weight: 700;
      cursor: pointer;
      padding: 0 14px;
    }
    .send-btn:disabled {
      opacity: 0.65;
      cursor: not-allowed;
    }

    .hint {
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .loading {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      color: var(--accent);
      font-size: 12px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: blink 1s infinite ease-in-out;
    }
    .dot:nth-child(2) { animation-delay: .15s; }
    .dot:nth-child(3) { animation-delay: .3s; }
    @keyframes blink {
      0%, 80%, 100% { opacity: .2; transform: translateY(0); }
      40% { opacity: 1; transform: translateY(-2px); }
    }

    .error {
      color: var(--danger);
      font-size: 12px;
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="header">
      <div class="title">
        <h1>🤖 GDL Copilot</h1>
        <p>Archicad GDL 修复助手</p>
      </div>
    </header>

    <main id="chat" class="chat"></main>

    <footer class="composer">
      <div class="input-row">
        <textarea id="input" placeholder="粘贴报错信息或代码片段..."></textarea>
        <button id="send" class="send-btn">发送</button>
      </div>
      <div class="hint">
        <span>Enter 发送，Shift+Enter 换行</span>
        <span id="status"></span>
      </div>
      <div id="error" class="error"></div>
    </footer>
  </div>

  <script>
    const chatEl = document.getElementById('chat');
    const inputEl = document.getElementById('input');
    const sendEl = document.getElementById('send');
    const statusEl = document.getElementById('status');
    const errorEl = document.getElementById('error');

    const history = [];
    let sending = false;

    function escapeHtml(str) {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function parseMessageWithCodeBlocks(text) {
      const regex = /```gdl\s*([\s\S]*?)```/gi;
      const segments = [];
      let lastIndex = 0;
      let m;
      while ((m = regex.exec(text)) !== null) {
        if (m.index > lastIndex) {
          segments.push({ type: 'text', content: text.slice(lastIndex, m.index) });
        }
        segments.push({ type: 'code', content: (m[1] || '').trim() });
        lastIndex = regex.lastIndex;
      }
      if (lastIndex < text.length) {
        segments.push({ type: 'text', content: text.slice(lastIndex) });
      }
      if (segments.length === 0) {
        segments.push({ type: 'text', content: text });
      }
      return segments;
    }

    function createCopyButton(codeText) {
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = '复制';
      btn.addEventListener('click', async () => {
        try {
          await navigator.clipboard.writeText(codeText);
          btn.disabled = true;
          const old = btn.textContent;
          btn.textContent = '✓ 已复制';
          setTimeout(() => {
            btn.textContent = old;
            btn.disabled = false;
          }, 2000);
        } catch {
          btn.textContent = '复制失败';
          setTimeout(() => (btn.textContent = '复制'), 1500);
        }
      });
      return btn;
    }

    function appendMessage(role, text) {
      const wrap = document.createElement('div');
      wrap.className = `msg-wrap ${role}`;

      const msg = document.createElement('div');
      msg.className = 'msg';

      if (role === 'assistant') {
        const segments = parseMessageWithCodeBlocks(text);
        for (const seg of segments) {
          if (seg.type === 'text' && seg.content.trim()) {
            const p = document.createElement('div');
            p.innerHTML = escapeHtml(seg.content);
            msg.appendChild(p);
          }
          if (seg.type === 'code') {
            const block = document.createElement('div');
            block.className = 'code';
            const pre = document.createElement('pre');
            pre.textContent = seg.content;
            block.appendChild(pre);
            block.appendChild(createCopyButton(seg.content));
            msg.appendChild(block);
          }
        }
      } else {
        msg.textContent = text;
      }

      wrap.appendChild(msg);
      chatEl.appendChild(wrap);
      chatEl.scrollTop = chatEl.scrollHeight;
    }

    function setLoading(on) {
      sending = on;
      sendEl.disabled = on;
      inputEl.disabled = on;
      if (on) {
        statusEl.innerHTML = '<span class="loading"><span class="dot"></span><span class="dot"></span><span class="dot"></span>发送中</span>';
      } else {
        statusEl.textContent = '';
      }
    }

    async function sendMessage() {
      const message = inputEl.value.trim();
      if (!message || sending) return;

      errorEl.textContent = '';
      appendMessage('user', message);
      const reqHistory = history.slice();
      inputEl.value = '';
      setLoading(true);

      try {
        const res = await fetch('http://localhost:8502/chat', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message, history: reqHistory })
        });

        if (!res.ok) {
          throw new Error(`HTTP ${res.status}`);
        }

        const data = await res.json();
        const reply = (data.reply || '').trim();
        history.push({ role: 'user', content: message });
        appendMessage('assistant', reply || '（空响应）');
        history.push({ role: 'assistant', content: reply || '（空响应）' });
      } catch (err) {
        errorEl.textContent = `请求失败：${err.message || err}`;
      } finally {
        setLoading(false);
        inputEl.focus();
      }
    }

    sendEl.addEventListener('click', sendMessage);
    inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    appendMessage('assistant', '你好！把 Archicad 的编译报错或有问题的 GDL 代码粘进来，我帮你修。');
    history.push({ role: 'assistant', content: '你好！把 Archicad 的编译报错或有问题的 GDL 代码粘进来，我帮你修。' });
    inputEl.focus();
  </script>
</body>
</html>
